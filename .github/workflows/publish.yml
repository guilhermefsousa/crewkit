name: Publish to npm

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Determine next version
        id: version
        run: |
          LATEST=$(git tag --sort=-v:refname | grep '^v' | head -1 | sed 's/^v//')
          if [ -z "$LATEST" ]; then
            LATEST="0.0.0"
          fi

          MSG="${{ github.event.head_commit.message }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"

          if echo "$MSG" | grep -qi '\[major\]'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$MSG" | grep -qi '\[minor\]'; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEXT="$MAJOR.$MINOR.$PATCH"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Bumping $LATEST -> $NEXT"

      - name: Set version and publish
        run: |
          npm version ${{ steps.version.outputs.next }} --no-git-tag-version
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create tag
        run: |
          git tag "v${{ steps.version.outputs.next }}"
          git push origin "v${{ steps.version.outputs.next }}"
